<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kalkulator Diskon · Belanja Hemat</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
    <style>
        /* ─── RESET & GLOBAL ─── */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            background: linear-gradient(145deg, #f7faff 0%, #eef4fb 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem 1.5rem;
            position: relative;
            overflow-x: hidden;
        }

        /* ─── ANIMASI LATAR ─── */
        .bg-shapes {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .bg-shapes span {
            position: absolute;
            border-radius: 50%;
            background: rgba(67, 97, 238, 0.06);
            animation: floatShape 16s infinite alternate ease-in-out;
        }
        .bg-shapes span:nth-child(1) {
            width: 300px;
            height: 300px;
            top: -80px;
            left: -60px;
            animation-duration: 18s;
        }
        .bg-shapes span:nth-child(2) {
            width: 400px;
            height: 400px;
            bottom: -120px;
            right: -80px;
            background: rgba(247, 37, 133, 0.05);
            animation-duration: 22s;
            animation-delay: 1s;
        }
        .bg-shapes span:nth-child(3) {
            width: 200px;
            height: 200px;
            top: 40%;
            left: 70%;
            background: rgba(252, 163, 17, 0.05);
            animation-duration: 14s;
            animation-delay: 0.5s;
        }
        @keyframes floatShape {
            0% {
                transform: translate(0, 0) scale(1) rotate(0deg);
            }
            100% {
                transform: translate(40px, -30px) scale(1.1) rotate(12deg);
            }
        }

        /* ─── WRAPPER ─── */
        .wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 860px;
            animation: fadeInUp 0.8s ease forwards;
        }

        @keyframes fadeInUp {
            0% {
                opacity: 0;
                transform: translateY(40px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ─── HEADER ─── */
        .header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .header .badge {
            display: inline-block;
            background: linear-gradient(135deg, #4361ee, #3a0ca3);
            color: #fff;
            font-weight: 700;
            font-size: 0.75rem;
            padding: 0.3rem 1rem;
            border-radius: 30px;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 0.8rem;
            box-shadow: 0 4px 12px rgba(67, 97, 238, 0.25);
        }
        .header h1 {
            font-size: 2.6rem;
            font-weight: 800;
            color: #1a1a2e;
            letter-spacing: -0.5px;
            line-height: 1.2;
        }
        .header h1 span {
            background: linear-gradient(135deg, #4361ee, #f72585);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header p {
            color: #5a6b7d;
            font-weight: 400;
            font-size: 1.05rem;
            margin-top: 0.3rem;
        }

        /* ─── CARD UTAMA ─── */
        .card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 2.2rem 2.5rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.07), 0 8px 24px rgba(0, 20, 50, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.6);
            transition: box-shadow 0.3s ease;
            margin-bottom: 2rem;
        }
        .card:hover {
            box-shadow: 0 28px 72px rgba(67, 97, 238, 0.10), 0 8px 28px rgba(0, 20, 50, 0.06);
        }

        /* ─── INPUT AREA ─── */
        .input-group {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-items: center;
            justify-content: center;
        }
        .input-group .field {
            flex: 2 1 260px;
            position: relative;
        }
        .input-group .field label {
            display: block;
            font-weight: 600;
            font-size: 0.85rem;
            color: #2d3748;
            margin-bottom: 0.4rem;
            letter-spacing: 0.3px;
        }
        .input-group .field .input-wrap {
            display: flex;
            align-items: center;
            background: #f1f5f9;
            border-radius: 16px;
            padding: 0 1rem;
            border: 2px solid transparent;
            transition: border-color 0.3s, background 0.3s, box-shadow 0.3s;
        }
        .input-group .field .input-wrap:focus-within {
            border-color: #4361ee;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(67, 97, 238, 0.12);
        }
        .input-group .field .input-wrap span {
            font-weight: 600;
            color: #4361ee;
            font-size: 1.1rem;
            margin-right: 0.3rem;
            white-space: nowrap;
        }
        .input-group .field .input-wrap input {
            border: none;
            background: transparent;
            padding: 1rem 0;
            font-size: 1.2rem;
            font-weight: 600;
            color: #1a1a2e;
            outline: none;
            width: 100%;
            font-family: 'Poppins', sans-serif;
            letter-spacing: 0.3px;
        }
        .input-group .field .input-wrap input::placeholder {
            color: #b0c0d0;
            font-weight: 400;
            font-size: 1rem;
        }

        .input-group .btn-hitung {
            flex: 0 0 auto;
            background: linear-gradient(135deg, #4361ee, #3a0ca3);
            color: #fff;
            border: none;
            padding: 1rem 2.4rem;
            border-radius: 16px;
            font-weight: 700;
            font-size: 1.05rem;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.3s, background 0.3s;
            box-shadow: 0 6px 20px rgba(67, 97, 238, 0.30);
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 1.3rem;
        }
        .input-group .btn-hitung:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 32px rgba(67, 97, 238, 0.35);
            background: linear-gradient(135deg, #3a56d4, #2e0a8a);
        }
        .input-group .btn-hitung:active {
            transform: scale(0.96);
        }
        .input-group .btn-hitung i {
            font-size: 1.3rem;
            line-height: 1;
        }

        /* ─── HASIL ─── */
        .hasil {
            margin-top: 2.2rem;
            padding-top: 2rem;
            border-top: 2px dashed rgba(67, 97, 238, 0.12);
            display: none;
            animation: fadeSlide 0.6s ease forwards;
        }
        .hasil.show {
            display: block;
        }

        @keyframes fadeSlide {
            0% {
                opacity: 0;
                transform: translateY(18px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hasil .row {
            display: flex;
            flex-wrap: wrap;
            gap: 1.2rem;
        }
        .hasil .row .col {
            flex: 1 1 160px;
            background: #f8faff;
            border-radius: 20px;
            padding: 1.2rem 1.4rem;
            text-align: center;
            border: 1px solid rgba(67, 97, 238, 0.06);
            transition: transform 0.2s, box-shadow 0.3s;
        }
        .hasil .row .col:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.04);
        }
        .hasil .row .col .label {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #7a8b9f;
        }
        .hasil .row .col .value {
            font-size: 1.6rem;
            font-weight: 800;
            color: #1a1a2e;
            margin-top: 0.2rem;
            line-height: 1.2;
        }
        .hasil .row .col .value.hemat {
            color: #06d6a0;
        }
        .hasil .row .col .value.diskon {
            color: #f72585;
        }
        .hasil .row .col .value.total {
            color: #4361ee;
        }

        .hasil .aturan-terpakai {
            margin-top: 1.2rem;
            background: #f0f7ff;
            padding: 0.9rem 1.4rem;
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            flex-wrap: wrap;
            font-weight: 600;
            font-size: 0.95rem;
            color: #1a1a2e;
            border-left: 4px solid #4361ee;
            animation: pulseGlow 2s infinite alternate;
        }
        @keyframes pulseGlow {
            0% {
                box-shadow: 0 0 0 0 rgba(67, 97, 238, 0.08);
            }
            100% {
                box-shadow: 0 0 0 8px rgba(67, 97, 238, 0.02);
            }
        }
        .hasil .aturan-terpakai .tag {
            background: #4361ee;
            color: #fff;
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.3px;
        }
        .hasil .aturan-terpakai .tag.lama {
            background: #06d6a0;
        }
        .hasil .aturan-terpakai .tag.baru {
            background: #4361ee;
        }

        /* ─── ATURAN DISKON ─── */
        .aturan-section {
            margin-top: 0.5rem;
        }
        .aturan-section .section-title {
            font-weight: 700;
            font-size: 1.1rem;
            color: #1a1a2e;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }
        .aturan-section .section-title small {
            font-weight: 400;
            font-size: 0.8rem;
            color: #7a8b9f;
        }

        .aturan-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
        }

        .aturan-card {
            background: #ffffff;
            border-radius: 18px;
            padding: 1.2rem 1rem;
            border: 1px solid #e9edf4;
            transition: transform 0.25s, box-shadow 0.3s, border-color 0.3s, background 0.3s;
            text-align: center;
            position: relative;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02);
        }
        .aturan-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.05);
            border-color: #c8d6e8;
        }
        .aturan-card .persen {
            font-size: 1.6rem;
            font-weight: 800;
            line-height: 1.2;
            color: #1a1a2e;
        }
        .aturan-card .persen .small {
            font-size: 0.9rem;
            font-weight: 600;
            color: #5a6b7d;
        }
        .aturan-card .detail {
            font-size: 0.8rem;
            color: #4a5b6d;
            margin-top: 0.2rem;
            font-weight: 500;
        }
        .aturan-card .detail b {
            color: #1a1a2e;
            font-weight: 700;
        }
        .aturan-card .min {
            font-size: 0.7rem;
            color: #7a8b9f;
            margin-top: 0.3rem;
            font-weight: 600;
            background: #f1f5f9;
            padding: 0.2rem 0.8rem;
            border-radius: 20px;
            display: inline-block;
        }
        .aturan-card .tag-label {
            display: inline-block;
            font-size: 0.6rem;
            font-weight: 700;
            padding: 0.15rem 0.7rem;
            border-radius: 30px;
            margin-top: 0.4rem;
            letter-spacing: 0.3px;
            background: #e9edf4;
            color: #4a5b6d;
        }
        .aturan-card .tag-label.lama {
            background: #06d6a0;
            color: #fff;
        }
        .aturan-card .tag-label.baru {
            background: #4361ee;
            color: #fff;
        }
        .aturan-card .check {
            position: absolute;
            top: -6px;
            right: -6px;
            background: #06d6a0;
            color: #fff;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 700;
            box-shadow: 0 4px 10px rgba(6, 214, 160, 0.3);
            opacity: 0;
            transform: scale(0.5);
            transition: opacity 0.3s, transform 0.3s;
        }
        .aturan-card.active {
            border-color: #4361ee;
            background: #f8fbff;
            box-shadow: 0 8px 24px rgba(67, 97, 238, 0.08);
        }
        .aturan-card.active .check {
            opacity: 1;
            transform: scale(1);
        }
        .aturan-card.active .persen {
            color: #4361ee;
        }
        .aturan-card.best {
            border-color: #f72585;
            background: #fff5f9;
            box-shadow: 0 8px 28px rgba(247, 37, 133, 0.10);
        }
        .aturan-card.best .persen {
            color: #f72585;
        }
        .aturan-card.best::after {
            content: '⭐ TERBAIK';
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            background: #f72585;
            color: #fff;
            font-size: 0.55rem;
            font-weight: 700;
            padding: 0.15rem 0.8rem;
            border-radius: 30px;
            letter-spacing: 0.5px;
            white-space: nowrap;
            box-shadow: 0 4px 12px rgba(247, 37, 133, 0.25);
        }

        /* ─── FOOTER ─── */
        .footer {
            text-align: center;
            margin-top: 2.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(0, 0, 0, 0.04);
            font-size: 0.9rem;
            color: #7a8b9f;
            font-weight: 400;
        }
        .footer strong {
            color: #1a1a2e;
            font-weight: 600;
        }
        .footer .heart {
            color: #f72585;
            display: inline-block;
            animation: heartbeat 1.6s infinite;
        }
        @keyframes heartbeat {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.2);
            }
        }

        /* ─── RESPONSIVE ─── */
        @media (max-width: 640px) {
            body {
                padding: 1.2rem 1rem;
            }
            .card {
                padding: 1.5rem 1.2rem;
                border-radius: 24px;
            }
            .header h1 {
                font-size: 1.8rem;
            }
            .header p {
                font-size: 0.95rem;
            }
            .input-group .field .input-wrap input {
                font-size: 1rem;
                padding: 0.8rem 0;
            }
            .input-group .btn-hitung {
                width: 100%;
                justify-content: center;
                padding: 0.9rem;
                margin-top: 0.6rem;
            }
            .hasil .row .col {
                flex: 1 1 120px;
                padding: 1rem 0.8rem;
            }
            .hasil .row .col .value {
                font-size: 1.3rem;
            }
            .aturan-grid {
                grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
                gap: 0.7rem;
            }
            .aturan-card .persen {
                font-size: 1.3rem;
            }
            .footer {
                font-size: 0.8rem;
            }
            .bg-shapes span {
                display: none;
            }
        }

        @media (max-width: 400px) {
            .header h1 {
                font-size: 1.5rem;
            }
            .card {
                padding: 1rem 0.8rem;
            }
            .aturan-grid {
                grid-template-columns: 1fr 1fr;
            }
            .hasil .row .col .value {
                font-size: 1.1rem;
            }
        }

        /* ─── UTILITY ─── */
        .text-muted {
            color: #7a8b9f;
        }
        .mt-1 {
            margin-top: 0.5rem;
        }
        .gap-1 {
            gap: 0.5rem;
        }
        .flex-center {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* tombol reset kecil */
        .btn-reset {
            background: none;
            border: none;
            color: #b0c0d0;
            font-size: 0.75rem;
            cursor: pointer;
            padding: 0.2rem 0.6rem;
            border-radius: 30px;
            transition: color 0.2s, background 0.2s;
            font-weight: 500;
            margin-left: 0.3rem;
        }
        .btn-reset:hover {
            color: #4361ee;
            background: rgba(67, 97, 238, 0.06);
        }
    </style>
</head>
<body>

    <!-- ─── LATAR DEKORASI ─── -->
    <div class="bg-shapes">
        <span></span>
        <span></span>
        <span></span>
    </div>

    <!-- ─── WRAPPER ─── -->
    <div class="wrapper">

        <!-- HEADER -->
        <div class="header">
            <div class="badge">💸 Promo Spesial</div>
            <h1>Kalkulator <span>Diskon</span></h1>
            <p>Masukkan total belanja, dapatkan potongan terbaik!</p>
        </div>

        <!-- CARD UTAMA -->
        <div class="card">

            <!-- INPUT -->
            <div class="input-group">
                <div class="field">
                    <label for="totalInput">Total Belanja</label>
                    <div class="input-wrap">
                        <span>Rp</span>
                        <input type="text" id="totalInput" placeholder="0" autocomplete="off" />
                        <button class="btn-reset" id="resetBtn" title="Kosongkan">✕</button>
                    </div>
                </div>
                <button class="btn-hitung" id="hitungBtn">
                    <span>⚡</span> Hitung Diskon
                </button>
            </div>

            <!-- HASIL -->
            <div class="hasil" id="hasilContainer">
                <div class="row" id="hasilRow">
                    <div class="col">
                        <div class="label">Total Belanja</div>
                        <div class="value total" id="totalDisplay">Rp 0</div>
                    </div>
                    <div class="col">
                        <div class="label">Diskon</div>
                        <div class="value diskon" id="diskonDisplay">Rp 0</div>
                    </div>
                    <div class="col">
                        <div class="label">Total Bayar</div>
                        <div class="value total" id="bayarDisplay">Rp 0</div>
                    </div>
                    <div class="col">
                        <div class="label">Anda Hemat</div>
                        <div class="value hemat" id="hematDisplay">Rp 0</div>
                    </div>
                </div>
                <div id="aturanTerpakai" class="aturan-terpakai">
                    <span>🏷️</span> Aturan: <span id="aturanNama">—</span>
                    <span class="tag" id="aturanTag">—</span>
                </div>
            </div>

        </div>

        <!-- ATURAN DISKON -->
        <div class="aturan-section">
            <div class="section-title">
                📋 Aturan Diskon
                <small>— pilih yang paling menguntungkan</small>
            </div>
            <div class="aturan-grid" id="aturanGrid">
                <!-- akan di-render oleh JS -->
            </div>
        </div>

        <!-- FOOTER -->
        <div class="footer">
            Dibuat oleh <strong>DAPPPP</strong> — order suntik langsung hubungi telegram @dapsigmaa
        </div>

    </div>

    <script>
        // ──────────────────────────────────────────────
        //  DATA ATURAN DISKON (diperbarui)
        // ──────────────────────────────────────────────
        const aturan = [{
            id: 5,
            label: '50% 50RB (Lama)',
            persen: 50,
            maxPotongan: 50000,
            minBelanja: 25000,
            display: '50% · max Rp 50.000',
            tag: 'PENGGUNA LAMA'
        }, {
            id: 6,
            label: '100% 50K (Lama)',
            persen: 100,
            maxPotongan: 50000,
            minBelanja: 25000,
            display: '100% · max Rp 50.000',
            tag: 'PENGGUNA LAMA'
        }, {
            id: 3,
            label: '50% 100RB (Baru)',
            persen: 50,
            maxPotongan: 100000,
            minBelanja: 100000,
            display: '50% · max Rp 100.000',
            tag: 'PENGGUNA BARU'
        }, {
            id: 2,
            label: '100% 100RB (Baru)',
            persen: 100,
            maxPotongan: 100000,
            minBelanja: 150000,
            display: '100% · max Rp 100.000',
            tag: 'PENGGUNA BARU'
        }, {
            id: 4,
            label: '50% 200RB (Baru)',
            persen: 50,
            maxPotongan: 200000,
            minBelanja: 200000,
            display: '50% · max Rp 200.000',
            tag: 'PENGGUNA BARU'
        }];

        // ──────────────────────────────────────────────
        //  UTILITY FORMAT
        // ──────────────────────────────────────────────
        function formatRupiah(angka) {
            if (angka === undefined || angka === null || isNaN(angka)) return 'Rp 0';
            const bulat = Math.round(angka);
            const str = bulat.toString();
            const parts = str.split('.');
            const utama = parts[0];
            const ribuan = utama.replace(/\B(?=(\d{3})+(?!\d))/g, '.');
            return 'Rp ' + ribuan + (parts.length > 1 ? '.' + parts[1] : '');
        }

        function formatAngka(angka) {
            if (angka === undefined || angka === null || isNaN(angka)) return '0';
            const bulat = Math.round(angka);
            return bulat.toString().replace(/\B(?=(\d{3})+(?!\d))/g, '.');
        }

        function parseAngka(teks) {
            if (!teks) return 0;
            const bersih = teks.replace(/[^0-9]/g, '');
            return parseInt(bersih, 10) || 0;
        }

        // ──────────────────────────────────────────────
        //  DOM REFS
        // ──────────────────────────────────────────────
        const inputEl = document.getElementById('totalInput');
        const hitungBtn = document.getElementById('hitungBtn');
        const resetBtn = document.getElementById('resetBtn');
        const hasilContainer = document.getElementById('hasilContainer');
        const totalDisplay = document.getElementById('totalDisplay');
        const diskonDisplay = document.getElementById('diskonDisplay');
        const bayarDisplay = document.getElementById('bayarDisplay');
        const hematDisplay = document.getElementById('hematDisplay');
        const aturanNama = document.getElementById('aturanNama');
        const aturanTag = document.getElementById('aturanTag');
        const aturanGrid = document.getElementById('aturanGrid');

        let nilaiTotal = 0;
        let hasilPerhitungan = null;

        // ──────────────────────────────────────────────
        //  RENDER ATURAN CARD (dengan tag)
        // ──────────────────────────────────────────────
        function renderAturan() {
            aturanGrid.innerHTML = '';
            aturan.forEach((r) => {
                const card = document.createElement('div');
                card.className = 'aturan-card';
                card.dataset.id = r.id;
                const tagClass = r.tag === 'PENGGUNA LAMA' ? 'lama' : 'baru';
                card.innerHTML = `
                    <div class="persen">${r.persen}% <span class="small">max</span></div>
                    <div class="detail"><b>${formatRupiah(r.maxPotongan)}</b></div>
                    <div class="min">🛒 min ${formatRupiah(r.minBelanja)}</div>
                    <div class="tag-label ${tagClass}">${r.tag}</div>
                    <div class="check">✓</div>
                `;
                aturanGrid.appendChild(card);
            });
        }
        renderAturan();

        // ──────────────────────────────────────────────
        //  UPDATE ATURAN CARD STATUS
        // ──────────────────────────────────────────────
        function updateAturanCards(total, pilihanId) {
            const cards = aturanGrid.querySelectorAll('.aturan-card');
            aturan.forEach((r, idx) => {
                const card = cards[idx];
                card.classList.remove('active', 'best');
                if (total >= r.minBelanja) {
                    card.classList.add('active');
                }
                if (pilihanId === r.id) {
                    card.classList.add('best');
                }
            });
        }

        // ──────────────────────────────────────────────
        //  HITUNG DISKON
        // ──────────────────────────────────────────────
        function hitungDiskon(total) {
            if (total < 0) total = 0;
            let terbaik = {
                potongan: 0,
                aturan: null,
                persen: 0,
            };

            for (const r of aturan) {
                if (total >= r.minBelanja) {
                    let pot = (total * r.persen) / 100;
                    if (pot > r.maxPotongan) pot = r.maxPotongan;
                    if (pot > terbaik.potongan) {
                        terbaik.potongan = pot;
                        terbaik.aturan = r;
                        terbaik.persen = r.persen;
                    }
                }
            }

            if (terbaik.aturan === null) {
                return {
                    diskon: 0,
                    totalBayar: total,
                    hemat: 0,
                    aturan: null,
                    persen: 0,
                    label: 'Tidak ada diskon berlaku',
                    tag: '⛔',
                    tagClass: ''
                };
            }

            const diskon = terbaik.potongan;
            const totalBayar = total - diskon;
            const tagClass = terbaik.aturan.tag === 'PENGGUNA LAMA' ? 'lama' : 'baru';
            return {
                diskon: diskon,
                totalBayar: totalBayar,
                hemat: diskon,
                aturan: terbaik.aturan,
                persen: terbaik.persen,
                label: terbaik.aturan.label,
                tag: `${terbaik.persen}% · ${terbaik.aturan.tag}`,
                tagClass: tagClass,
            };
        }

        // ──────────────────────────────────────────────
        //  TAMPILKAN HASIL
        // ──────────────────────────────────────────────
        function tampilkanHasil(total) {
            if (total === 0) {
                hasilContainer.classList.remove('show');
                updateAturanCards(0, null);
                return;
            }

            const hasil = hitungDiskon(total);
            hasilPerhitungan = hasil;

            totalDisplay.textContent = formatRupiah(total);
            diskonDisplay.textContent = formatRupiah(hasil.diskon);
            bayarDisplay.textContent = formatRupiah(hasil.totalBayar);
            hematDisplay.textContent = formatRupiah(hasil.hemat);

            if (hasil.aturan) {
                aturanNama.textContent = hasil.label + ' · min ' + formatRupiah(hasil.aturan.minBelanja);
                aturanTag.textContent = hasil.tag;
                aturanTag.className = 'tag ' + hasil.tagClass;
                updateAturanCards(total, hasil.aturan.id);
            } else {
                aturanNama.textContent = hasil.label;
                aturanTag.textContent = hasil.tag;
                aturanTag.className = 'tag';
                updateAturanCards(total, null);
            }

            hasilContainer.classList.add('show');
        }

        // ──────────────────────────────────────────────
        //  INPUT FORMATTER
        // ──────────────────────────────────────────────
        function formatInput(teks) {
            const angka = parseAngka(teks);
            if (angka === 0) return '';
            return formatAngka(angka);
        }

        inputEl.addEventListener('input', function(e) {
            const raw = this.value;
            const angka = parseAngka(raw);
            nilaiTotal = angka;
            const formatted = formatAngka(angka);
            const start = this.selectionStart;
            const end = this.selectionEnd;
            this.value = formatted;
            if (raw !== formatted) {
                const diff = formatted.length - raw.length;
                this.setSelectionRange(start + diff, end + diff);
            }
            if (angka > 0) {
                tampilkanHasil(angka);
            } else {
                hasilContainer.classList.remove('show');
                updateAturanCards(0, null);
            }
        });

        // ──────────────────────────────────────────────
        //  TOMBOL HITUNG
        // ──────────────────────────────────────────────
        hitungBtn.addEventListener('click', function() {
            const raw = inputEl.value;
            const angka = parseAngka(raw);
            nilaiTotal = angka;
            if (angka === 0) {
                hasilContainer.classList.remove('show');
                updateAturanCards(0, null);
                return;
            }
            tampilkanHasil(angka);
        });

        // ──────────────────────────────────────────────
        //  TOMBOL RESET
        // ──────────────────────────────────────────────
        resetBtn.addEventListener('click', function() {
            inputEl.value = '';
            nilaiTotal = 0;
            hasilContainer.classList.remove('show');
            updateAturanCards(0, null);
            inputEl.focus();
        });

        // ──────────────────────────────────────────────
        //  ENTER = HITUNG
        // ──────────────────────────────────────────────
        inputEl.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                hitungBtn.click();
            }
        });

        // ──────────────────────────────────────────────
        //  INIT
        // ──────────────────────────────────────────────
        inputEl.value = '';
        hasilContainer.classList.remove('show');
        updateAturanCards(0, null);
        inputEl.focus();
    </script>

</body>
</html>
